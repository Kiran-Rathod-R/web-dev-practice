<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <form action="">
        <h5>enter your name:</h5>
        <input type="text" placeholder="NAME">

        <h5>enter your password:</h5>
        <input type="password" placeholder="password">

        <h5>select your class:</h5>
        <label for="101">
            <input type="radio" value="CLASS 11TH" id="101" name="class">CLASS 11TH
            <input type="radio" value="CLASS 12TH" id="101" name="class">CLASS 12TH
            <!-- label is to make whole word as a button -->
        </label>
        <label for="102">>
            <h5>check the box</h5>
            <input type="checkbox" value="math" name="sub" id="102">math
            <input type="checkbox" value="chem" name="sub" id="102">chem
        </label>

<h5>select your city</h5>
        <select name="city" id="103">
            <option value="pune">pune</option>
            <option value="mumbai">mumbai</option>
            <option value="banglore">banglore</option>
            <option value="dubai">dubai</option>
            <option value="chennai">chennai</option>
        </select>
<h5>give a feedback</h5>
        <textarea name="feedback" type="feedback" id="101" placeholder="give a feedback" rows="5"></textarea>

        <button>submit</button>
    </form>
</body>

</html>
